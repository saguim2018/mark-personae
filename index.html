<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dramatis Personae · The Gospel of Mark</title>
<meta name="description" content="마가복음에 등장하는 30인의 캐릭터 시트 — 1세기 유대·로마의 인물 고증">
<meta property="og:title" content="Dramatis Personae · The Gospel of Mark">
<meta property="og:description" content="마가복음 30인의 캐릭터 시트">
<meta property="og:image" content="./images/01-jesus.jpg">
<meta name="theme-color" content="#14110d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14110d;
    --ink-2: #1f1a14;
    --ink-3: #2a241c;
    --paper: #f1e8d6;
    --paper-2: #e8dcc4;
    --paper-shade: #d9c9a8;
    --rubric: #8a2920;
    --rubric-2: #b04032;
    --gold: #b08a3e;
    --gold-bright: #d4a94e;
    --muted: #6b5d44;
    --line: rgba(20, 17, 13, 0.18);
    --line-light: rgba(241, 232, 214, 0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--ink);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(176, 138, 62, 0.07), transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(138, 41, 32, 0.06), transparent 55%);
    color: var(--paper);
    font-family: 'Noto Serif KR', 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 1;
  }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 44px 24px 22px;
    position: relative;
    z-index: 2;
    border-bottom: 1px solid var(--line-light);
  }
  .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(32px, 6vw, 52px);
    letter-spacing: 0.06em;
    color: var(--paper);
    line-height: 1.05;
  }
  .sub-ko {
    margin-top: 8px;
    font-family: 'Gowun Batang', 'Noto Serif KR', serif;
    font-weight: 400;
    font-size: clamp(14px, 2.5vw, 16px);
    color: var(--muted);
    letter-spacing: 0.22em;
  }
  .rule {
    width: 60px; height: 1px; background: var(--gold);
    margin: 20px auto 10px;
    opacity: 0.7;
  }
  .meta-count {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.2em;
  }

  /* ─── GRID ─── */
  main {
    padding: 36px clamp(16px, 4vw, 56px) 60px;
    position: relative;
    z-index: 2;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
    max-width: 1480px;
    margin: 0 auto;
  }
  .card {
    position: relative;
    aspect-ratio: 3 / 4;
    background: var(--ink-2);
    border: 1px solid var(--line-light);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--gold);
    box-shadow: 0 14px 30px -10px rgba(0,0,0,0.7), 0 0 0 1px var(--gold);
  }
  .card-thumb {
    position: absolute; inset: 0;
    background-size: 320% auto;       /* zoom into face area of sheet */
    background-position: 27% 32%;
    background-repeat: no-repeat;
    background-color: var(--paper-shade);
    transition: background-size 0.6s ease;
  }
  .card:hover .card-thumb {
    background-size: 360% auto;
  }
  .card-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 14px 14px 12px;
    background: linear-gradient(180deg, transparent 0%, rgba(20,17,13,0.85) 45%, rgba(20,17,13,0.96) 100%);
    color: var(--paper);
  }
  .card-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 3px;
  }
  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .card-name-ko {
    margin-top: 3px;
    font-family: 'Noto Serif KR', serif;
    font-weight: 400;
    font-size: 12px;
    color: rgba(241, 232, 214, 0.65);
    letter-spacing: 0.08em;
  }
  .card-ref {
    position: absolute;
    top: 10px; right: 10px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--paper);
    background: rgba(20, 17, 13, 0.75);
    padding: 3px 8px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(4px);
    letter-spacing: 0.06em;
  }

  /* ─── VIEWER ─── */
  .viewer {
    position: fixed;
    inset: 0;
    background: rgba(8, 7, 5, 0.97);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    flex-direction: column;
    overscroll-behavior: contain;
  }
  .viewer.open { display: flex; }
  .viewer-header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--line-light);
    gap: 14px;
  }
  .v-title {
    display: flex; flex-direction: column; gap: 3px;
    min-width: 0;
  }
  .v-name-row {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  .v-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 24px;
    letter-spacing: 0.04em;
    color: var(--paper);
  }
  .v-ref {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--rubric-2);
    letter-spacing: 0.06em;
  }
  .v-sub {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }
  .v-sub .ko { color: rgba(241, 232, 214, 0.7); }
  .v-sub .epithet { color: var(--gold); margin-left: 8px; }
  .v-actions {
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  .v-counter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--muted);
    margin-right: 8px;
    white-space: nowrap;
  }
  .v-counter .cur { color: var(--paper); font-size: 17px; }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--line-light);
    color: var(--paper);
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--gold); color: var(--gold); }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .icon-btn svg { width: 16px; height: 16px; }

  .viewer-stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0a0806;
    cursor: grab;
    touch-action: none;
  }
  .viewer-stage:active { cursor: grabbing; }
  .sheet-img {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    transition: transform 0.05s linear;
    max-width: none;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    image-rendering: -webkit-optimize-contrast;
  }
  .stage-loading {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.2em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stage-loading.show { opacity: 1; }

  .viewer-nav {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    background: rgba(20, 17, 13, 0.78);
    border: 1px solid var(--line-light);
    color: var(--paper);
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 5;
    transition: all 0.2s ease;
  }
  .viewer-nav:hover { border-color: var(--gold); color: var(--gold); background: rgba(20, 17, 13, 0.95); }
  .viewer-nav.prev { left: 18px; }
  .viewer-nav.next { right: 18px; }
  .viewer-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .viewer-nav svg { width: 18px; height: 18px; }

  .zoom-controls {
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: rgba(20, 17, 13, 0.85);
    padding: 6px;
    border: 1px solid var(--line-light);
    border-radius: 999px;
    backdrop-filter: blur(8px);
    z-index: 5;
  }
  .zoom-controls button {
    background: transparent;
    border: none;
    color: var(--paper);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .zoom-controls button:hover { background: rgba(176, 138, 62, 0.2); color: var(--gold); }
  .zoom-controls .zoom-pct {
    min-width: 60px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    align-self: center;
    padding: 0 8px;
  }
  .zoom-controls svg { width: 14px; height: 14px; }

  /* Note strip */
  .v-note {
    flex-shrink: 0;
    padding: 12px 22px 14px;
    border-top: 1px solid var(--line-light);
    background: rgba(20, 17, 13, 0.6);
    font-family: 'Gowun Batang', 'Noto Serif KR', serif;
    font-size: 13px;
    line-height: 1.6;
    color: rgba(241, 232, 214, 0.78);
    max-height: 22vh;
    overflow-y: auto;
    display: none;
  }
  .v-note.show { display: block; }
  .v-note .quote {
    margin-top: 6px;
    color: var(--rubric-2);
    font-style: italic;
  }
  .v-note .quote::before { content: '“'; margin-right: 2px; }
  .v-note .quote::after { content: '”'; margin-left: 2px; }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 28px 16px 44px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    position: relative;
    z-index: 2;
    border-top: 1px solid var(--line-light);
    margin-top: 40px;
    line-height: 1.8;
  }
  footer .latin {
    font-style: italic;
    letter-spacing: 0.25em;
    color: var(--gold);
    margin-bottom: 8px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .card-name { font-size: 15px; }
    .card-name-ko { font-size: 11px; }
    .card-overlay { padding: 10px 10px 9px; }
    .card-ref { font-size: 10px; padding: 2px 6px; }
    .viewer-header { padding: 10px 14px; gap: 8px; }
    .v-name { font-size: 18px; }
    .v-ref { font-size: 12px; }
    .v-sub { font-size: 11px; }
    .v-counter { font-size: 11px; margin-right: 4px; }
    .v-counter .cur { font-size: 14px; }
    .icon-btn { width: 34px; height: 34px; }
    .icon-btn svg { width: 14px; height: 14px; }
    .viewer-nav { width: 40px; height: 40px; }
    .viewer-nav.prev { left: 8px; }
    .viewer-nav.next { right: 8px; }
    .v-note { font-size: 12px; padding: 10px 14px 12px; max-height: 32vh; }
    .zoom-controls { bottom: 14px; padding: 4px; }
    .zoom-controls button { width: 32px; height: 32px; }
    .zoom-controls .zoom-pct { font-size: 11px; min-width: 50px; padding: 0 4px; }
  }
  @media (max-width: 380px) {
    .v-name-row { gap: 8px; }
    .v-name { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">ΚΑΤΑ ΜΑΡΚΟΝ · The Gospel of Mark</div>
  <h1>Dramatis Personae</h1>
  <div class="sub-ko">마가복음 인물 캐릭터 시트</div>
  <div class="rule"></div>
  <div class="meta-count">XXX OF XXX FIGURES</div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="latin">εὐθὺς · straightway</div>
  ΚΑΤΑ ΜΑΡΚΟΝ — The Gospel of Mark<br>
  <span style="font-family:'Noto Serif KR',serif; font-size:11px; color:var(--muted); letter-spacing:0.1em;">
    캐릭터 시트는 1세기 유대·로마 문화를 기반으로 재현한 시각적 추정입니다.
  </span>
</footer>

<!-- Viewer Modal -->
<div class="viewer" id="viewer" aria-hidden="true">
  <div class="viewer-header">
    <div class="v-title">
      <div class="v-name-row">
        <span class="v-name" id="v-name">—</span>
        <span class="v-ref" id="v-ref"></span>
      </div>
      <div class="v-sub">
        <span class="ko" id="v-ko">—</span>
        <span class="epithet" id="v-epithet"></span>
      </div>
    </div>
    <div class="v-actions">
      <div class="v-counter"><span class="cur" id="v-cur">01</span> / <span id="v-total">30</span></div>
      <button class="icon-btn" id="v-info" aria-label="설명 보기" title="설명 보기 (i)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/><circle cx="12" cy="8" r="0.5" fill="currentColor"/></svg>
      </button>
      <button class="icon-btn" id="v-close" aria-label="닫기" title="닫기 (Esc)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
      </button>
    </div>
  </div>

  <div class="viewer-stage" id="stage">
    <button class="viewer-nav prev" id="v-prev" aria-label="이전">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img class="sheet-img" id="sheet-img" alt="">
    <div class="stage-loading" id="stage-loading">loading…</div>
    <button class="viewer-nav next" id="v-next" aria-label="다음">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="zoom-controls">
      <button id="zoom-out" aria-label="축소" title="− 키">−</button>
      <div class="zoom-pct" id="zoom-pct">100%</div>
      <button id="zoom-in" aria-label="확대" title="+ 키">+</button>
      <button id="zoom-reset" aria-label="원래대로" title="0 키 (맞춤)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 4 3 9 8 9"/></svg>
      </button>
    </div>
  </div>

  <div class="v-note" id="v-note">
    <div id="v-desc"></div>
    <div class="quote" id="v-quote"></div>
  </div>
</div>

<script>
  // ─── DATA — Mark order ───
  const characters = [
    { id:'jesus', file:'01-jesus.jpg', name:'Jesus Christ', ko:'예수 그리스도', ref:'Mk 1:1',
      epithet:'하나님의 아들 · 섬기는 종',
      desc:'마가가 그리는 예수는 말보다 행동하시는 분이다. "곧"(εὐθὺς)이라는 부사가 복음서를 가로지르며 그분의 발걸음을 재촉한다. 가르치시고, 고치시고, 마침내 자기를 내어주신다.',
      quote:'인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라 (막 10:45)' },
    { id:'john-baptist', file:'02-john-baptist.jpg', name:'John the Baptist', ko:'세례 요한', ref:'Mk 1:4',
      epithet:'광야의 외치는 소리',
      desc:'낙타 털 옷에 가죽 띠, 메뚜기와 석청을 먹는 예언자. 회개의 세례를 베풀며 메시아의 길을 예비했고, 헤롯의 손에 참수당해 새 시대의 첫 순교자가 되었다.',
      quote:'나보다 능력 많으신 이가 내 뒤에 오시나니 나는 굽혀 그의 신발끈을 풀기도 감당하지 못하겠노라 (막 1:7)' },
    { id:'peter', file:'03-peter.jpg', name:'Simon Peter', ko:'시몬 베드로', ref:'Mk 1:16',
      epithet:'갈릴리 어부 · 으뜸 제자',
      desc:'그물을 버리고 따랐고 신앙고백 후 곧 책망받았다. 변화산의 영광과 닭 울기 전 세 번의 부인을 모두 겪은 사람. 마가복음의 주된 증언자로 전해진다.',
      quote:'주는 그리스도시니이다 (막 8:29)' },
    { id:'james-zebedee', file:'04-james-zebedee.jpg', name:'James, son of Zebedee', ko:'야고보 (세베대의 아들)', ref:'Mk 1:19',
      epithet:'보아너게 · 천둥의 아들',
      desc:'동생 요한과 함께 "우레의 아들"이라 불린 격정의 사람. 베드로·요한과 더불어 변화산, 야이로의 집, 겟세마네에 함께 들어갔다. 사도 중 가장 먼저 순교했다.',
      quote:'주의 잔을 우리가 마실 수 있나이다 (막 10:39)' },
    { id:'john-zebedee', file:'05-john-zebedee.jpg', name:'John, son of Zebedee', ko:'요한 (세베대의 아들)', ref:'Mk 1:19',
      epithet:'보아너게 · 사랑하시던 제자',
      desc:'야고보의 형제. 영광의 자리를 구했으나 십자가의 잔이 무엇인지 알지 못했다. 그러나 끝내 그 잔을 마시는 데까지 자라간 제자.',
      quote:'주의 영광 중에서 우리를 우편과 좌편에 앉게 하여 주옵소서 (막 10:37)' },
    { id:'demoniac-capernaum', file:'06-demoniac-capernaum.jpg', name:'The Capernaum Demoniac', ko:'가버나움 귀신들린 자', ref:'Mk 1:23',
      epithet:'회당에서 부르짖은 영',
      desc:'안식일에 가버나움 회당에 들어와 큰 소리로 외친 자. 귀신이 먼저 예수를 알아보고 떨었다. 마가복음 첫 번째 축귀의 자리.',

      epithet:'풀려난 죄수',
      desc:'반란과 살인 혐의로 옥에 갇혀 있던 죄수. 빌라도가 무리에게 풀어줄 자를 묻자, 무리는 그를 택하고 예수를 십자가에 못 박으라 외쳤다. 예수가 그의 자리에 섰다.',
      quote:'바라바를 우리에게 놓아 주소서 (눅 23:18 ; 막 15:11)' },
    { id:'simon-cyrene', file:'27-simon-cyrene.jpg', name:'Simon of Cyrene', ko:'구레네 사람 시몬', ref:'Mk 15:21',

      desc:'시골에서 올라오던 북아프리카 디아스포라 유대인. 알렉산더와 루포의 아버지. 군병들이 그를 강제로 붙들어 예수의 십자가를 지게 했다 — 짧지만 깊이 남은 한 사람의 동행.',
      quote:'마침 시몬이 시골로부터 와서 지나가는데 그를 억지로 같이 가게 하여 예수의 십자가를 지우고 (막 15:21)' },
    { id:'centurion', file:'28-centurion.jpg', name:'The Centurion', ko:'로마 백부장', ref:'Mk 15:39',

      quote:'이 사람은 진실로 하나님의 아들이었도다 (막 15:39)' },
    { id:'mary-magdalene', file:'29-mary-magdalene.jpg', name:'Mary Magdalene', ko:'막달라 마리아', ref:'Mk 15:40',
      epithet:'부활의 첫 증인',
      desc:'갈릴리에서부터 예수를 따른 여인. 제자들이 모두 도망친 십자가 곁에 서 있었고, 동이 트기 전 무덤으로 향한 사람. 마가복음의 마지막 장면에서 가장 먼저 빈 무덤을 본 여인.',
      quote:'그가 살아나셨고 여기 계시지 아니하니라 (막 16:6)' },
    { id:'joseph-arimathea', file:'30-joseph-arimathea.jpg', name:'Joseph of Arimathea', ko:'아리마대 요셉', ref:'Mk 15:43',
      epithet:'새 무덤에 모신 자',
      desc:'공회의 존경받는 의원이면서도 하나님의 나라를 기다린 자. 다른 의원들과 달리 예수의 사형 결의에 동조하지 않았다. 담대히 빌라도에게 시신을 청해 자신의 새 무덤에 장사했다.',
      quote:'하나님의 나라를 기다리는 자라 당돌히 빌라도에게 들어가 예수의 시체를 달라 하니 (막 15:43)' }
  ];

  // ─── INIT ───
  document.querySelector('.meta-count').textContent =
    `${String(characters.length).padStart(3,'0')} OF ${String(characters.length).padStart(3,'0')} FIGURES`;
  document.getElementById('v-total').textContent = String(characters.length).padStart(2, '0');

  // ─── GRID ───
  const grid = document.getElementById('grid');
  characters.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = i;

    const thumb = document.createElement('div');
    thumb.className = 'card-thumb';
    thumb.style.backgroundImage = `url('./images/${c.file}')`;
    card.appendChild(thumb);

    const ref = document.createElement('div');
    ref.className = 'card-ref';
    ref.textContent = c.ref;
    card.appendChild(ref);

    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.innerHTML = `
      <div class="card-num">No. ${String(i+1).padStart(2,'0')}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-name-ko">${c.ko}</div>
    `;
    card.appendChild(overlay);

    card.addEventListener('click', () => openViewer(i));
    grid.appendChild(card);
  });

  // ─── VIEWER ───
  const viewer = document.getElementById('viewer');
  const stage = document.getElementById('stage');
  const sheetImg = document.getElementById('sheet-img');
  const loading = document.getElementById('stage-loading');
  const vName = document.getElementById('v-name');
  const vKo = document.getElementById('v-ko');
  const vRef = document.getElementById('v-ref');
  const vEpithet = document.getElementById('v-epithet');
  const vCur = document.getElementById('v-cur');
  const vPrev = document.getElementById('v-prev');
  const vNext = document.getElementById('v-next');
  const vClose = document.getElementById('v-close');
  const vInfo = document.getElementById('v-info');
  const vNote = document.getElementById('v-note');
  const vDesc = document.getElementById('v-desc');
  const vQuote = document.getElementById('v-quote');
  const zoomIn = document.getElementById('zoom-in');
  const zoomOut = document.getElementById('zoom-out');
  const zoomReset = document.getElementById('zoom-reset');
  const zoomPct = document.getElementById('zoom-pct');

  let currentIdx = -1;
  let zoom = 1, baseZoom = 1, panX = 0, panY = 0;

  function openViewer(idx, replaceHistory = true) {
    currentIdx = idx;
    const c = characters[idx];
    vName.textContent = c.name;
    vKo.textContent = c.ko + ' · ';
    vRef.textContent = c.ref;
    vEpithet.textContent = c.epithet;
    vCur.textContent = String(idx + 1).padStart(2, '0');
    vPrev.disabled = idx === 0;
    vNext.disabled = idx === characters.length - 1;
    vDesc.textContent = c.desc;
    vQuote.textContent = c.quote;

    loading.classList.add('show');
    sheetImg.style.opacity = '0';
    sheetImg.onload = () => {
      loading.classList.remove('show');
      sheetImg.style.opacity = '1';
      fitToStage();
    };
    sheetImg.src = `./images/${c.file}`;
    if (sheetImg.complete && sheetImg.naturalWidth) {
      loading.classList.remove('show');
      sheetImg.style.opacity = '1';
      fitToStage();
    }

    viewer.classList.add('open');
    viewer.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    if (replaceHistory) history.replaceState(null, '', '?p=' + c.id);
  }

  function fitToStage() {
    if (!sheetImg.naturalWidth) return;
    const sw = stage.clientWidth;
    const sh = stage.clientHeight;
    const iw = sheetImg.naturalWidth;
    const ih = sheetImg.naturalHeight;
    const scale = Math.min(sw / iw, sh / ih) * 0.94;
    baseZoom = scale;
    zoom = scale;
    panX = (sw - iw * scale) / 2;
    panY = (sh - ih * scale) / 2;
    sheetImg.style.transformOrigin = '0 0';
    applyTransform();
  }

  function applyTransform() {
    sheetImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
    zoomPct.textContent = Math.round((zoom / baseZoom) * 100) + '%';
  }

  function closeViewer() {
    viewer.classList.remove('open');
    viewer.setAttribute('aria-hidden', 'true');
    vNote.classList.remove('show');
    document.body.style.overflow = '';
    history.replaceState(null, '', location.pathname);
  }

  function go(delta) {
    const next = currentIdx + delta;
    if (next < 0 || next >= characters.length) return;
    openViewer(next);
  }

  function doZoom(factor, cx, cy) {
    const newZoom = Math.max(baseZoom * 0.5, Math.min(baseZoom * 8, zoom * factor));
    if (cx === undefined) {
      cx = stage.clientWidth / 2;
      cy = stage.clientHeight / 2;
    }
    const wx = (cx - panX) / zoom;
    const wy = (cy - panY) / zoom;
    zoom = newZoom;
    panX = cx - wx * zoom;
    panY = cy - wy * zoom;
    applyTransform();
  }

  vClose.addEventListener('click', closeViewer);
  vPrev.addEventListener('click', () => go(-1));
  vNext.addEventListener('click', () => go(1));
  vInfo.addEventListener('click', () => vNote.classList.toggle('show'));
  zoomIn.addEventListener('click', () => doZoom(1.3));
  zoomOut.addEventListener('click', () => doZoom(1/1.3));
  zoomReset.addEventListener('click', () => fitToStage());

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (!viewer.classList.contains('open')) return;
    if (e.key === 'Escape') closeViewer();
    else if (e.key === 'ArrowLeft') go(-1);
    else if (e.key === 'ArrowRight') go(1);
    else if (e.key === '+' || e.key === '=') doZoom(1.25);
    else if (e.key === '-') doZoom(1/1.25);
    else if (e.key === '0') fitToStage();
    else if (e.key === 'i' || e.key === 'I') vNote.classList.toggle('show');
  });

  // Wheel zoom
  stage.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = stage.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
    doZoom(factor, cx, cy);
  }, { passive: false });

  // Mouse drag pan
  let isDragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
  stage.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    panStartX = panX; panStartY = panY;
  });
  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => { isDragging = false; });

  // Touch: pan + pinch
  let touchStart = null;
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      touchStart = {
        type: 'pan',
        x: e.touches[0].clientX, y: e.touches[0].clientY,
        panX, panY,
        time: Date.now()
      };
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = stage.getBoundingClientRect();
      touchStart = {
        type: 'pinch',
        dist, midX: midX - rect.left, midY: midY - rect.top,
        zoom
      };
    }
  }, { passive: true });
  stage.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    e.preventDefault();
    if (touchStart.type === 'pan' && e.touches.length === 1) {
      panX = touchStart.panX + (e.touches[0].clientX - touchStart.x);
      panY = touchStart.panY + (e.touches[0].clientY - touchStart.y);
      applyTransform();
    } else if (touchStart.type === 'pinch' && e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      const factor = dist / touchStart.dist;
      const newZoom = Math.max(baseZoom * 0.5, Math.min(baseZoom * 8, touchStart.zoom * factor));
      const wx = (touchStart.midX - panX) / zoom;
      const wy = (touchStart.midY - panY) / zoom;
      zoom = newZoom;
      panX = touchStart.midX - wx * zoom;
      panY = touchStart.midY - wy * zoom;
      applyTransform();
    }
  }, { passive: false });
  stage.addEventListener('touchend', () => { touchStart = null; }, { passive: true });

  // Double-click / double-tap zoom toggle
  stage.addEventListener('dblclick', (e) => {
    const rect = stage.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    if (zoom > baseZoom * 1.5) fitToStage();
    else doZoom(2.5, cx, cy);
  });

  window.addEventListener('resize', () => {
    if (viewer.classList.contains('open')) fitToStage();
  });

  // Deep link (?p=jesus)
  const params = new URLSearchParams(location.search);
  const initId = params.get('p');
  if (initId) {
    const idx = characters.findIndex(c => c.id === initId);
    if (idx >= 0) {
      // Defer to ensure layout is ready
      setTimeout(() => openViewer(idx, false), 50);
    }
  }
</script>
</body>
</html>
